name: Validar plantilla ARM IaC

on:
  push:
    paths:
      - "templates/**/*.json"
      - ".github/workflows/validar-iac.yml"
  pull_request:
    paths:
      - "templates/**/*.json"

jobs:
  validar-template:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar formato JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = list(Path("templates").glob("*.json"))

          if not files:
              raise SystemExit("No se encontraron archivos JSON en la carpeta templates.")

          for file in files:
              with open(file, encoding="utf-8-sig") as f:
                  json.load(f)
              print(f"Archivo JSON válido: {file}")

          print("Todas las plantillas JSON tienen formato correcto.")
          PY

      - name: Verificar recursos principales de Azure
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          template_file = Path("templates/template_test.json")

          if not template_file.exists():
              template_file = Path("templates/templates.json")

          if not template_file.exists():
              raise SystemExit("No se encontró template_test.json ni templates.json en la carpeta templates.")

          with open(template_file, encoding="utf-8-sig") as f:
              template = json.load(f)

          resources = template.get("resources", [])
          resource_types = {r.get("type", "") for r in resources}

          expected_types = {
              "Microsoft.Network/virtualNetworks",
              "Microsoft.Network/networkSecurityGroups",
              "Microsoft.Compute/virtualMachines",
              "Microsoft.DBforMySQL/flexibleServers",
              "Microsoft.Storage/storageAccounts"
          }

          missing = expected_types - resource_types

          print("Recursos encontrados:")
          for resource_type in sorted(resource_types):
              print(f"- {resource_type}")

          if missing:
              print("\nFaltan estos recursos:")
              for item in sorted(missing):
                  print(f"- {item}")
              raise SystemExit("La plantilla no contiene todos los recursos principales.")

          print("\nVALIDACIÓN OK: La plantilla contiene los recursos principales.")
          PY

      - name: Resumen
        run: |
          echo "## Validación de IaC" >> $GITHUB_STEP_SUMMARY
          echo "- Formato JSON validado correctamente." >> $GITHUB_STEP_SUMMARY
          echo "- Recursos principales verificados." >> $GITHUB_STEP_SUMMARY
          echo "- Plantilla lista para despliegue manual desde Azure Portal." >> $GITHUB_STEP_SUMMARY
